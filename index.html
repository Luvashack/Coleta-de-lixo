<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Coleta de Lixo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Routing -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
</head>
<body>

<header>
  ♻️ Coleta de Lixo
</header>

<div id="map"></div>

<div class="controls">

  <button onclick="irParaMinhaLocalizacao()">
    📍 <span>Minha localização</span>
  </button>
  <button onclick="atualizarMapa()">
    🔄 <span>Atualizar</span>
  </button>
  <button onclick="iniciarColetaInteligente()">
    🚛 <span>Rota inteligente</span>
  </button>
  <button onclick="rotaMaisProxima()">
    🧭 <span>Rota mais próxima</span>
  </button>
</div>

<div class="legenda">
  <div><span class="verde"></span> Disponível</div>
  <div><span class="vermelho"></span> Cheio</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script src="script.js"></script>

</body>
</html>
